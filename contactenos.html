<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contactenos</title>
    <link rel="stylesheet" href="css/contactenos.css">

    <!-- Iconos -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

<header class="navbar">
    <div class="logo">☕ Coffee</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="galeria.html">Galería</a>
        <a href="contactenos.html">Contactenos</a>
    </nav>

    <a href="login.html" class="nav-login" title="Iniciar sesión">
                    <i class='bx bx-user'></i>
                </a>
</header>

<section class="contact-section">

    <h2 class="contact-title">CONTACT US</h2>

    <div class="contact-container">

        <!-- LADO IZQUIERDO -->
        <div class="contact-info">
            <p><i class='bx bx-map'></i> 132 Camsite Avenue, wilderness, CA 98765</p>
            <p><i class='bx bx-envelope'></i> info@coffeeshopwebsite.com</p>
            <p><i class='bx bx-phone'></i> (123) 4456 - 78909</p>
            <p><i class='bx bx-time'></i> Monday - Friday: 9:00 A.M. a 5:00 P.M.</p>
            <p><i class='bx bx-time'></i> Saturday: 10:00 A.M. a 3:00 P.M.</p>
            <p><i class='bx bx-time'></i> Sunday: Closed</p>
            <p><i class='bx bx-globe'></i> www.codingnepweb.com</p>
        </div>

        <!-- LADO DERECHO -->
        <form class="contact-form">
            <input type="text" placeholder="Tu nombre">
            <input type="email" placeholder="Tu Email">
            <textarea placeholder="Tu mensaje"></textarea>
            <button type="submit">Enviar</button>
        </form>

    </div>

</section>

</body>
</html>
