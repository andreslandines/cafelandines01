<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro</title>

<link rel="stylesheet" href="css/registro.css">

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

</head>

<body>

<a href="login.html" class="volver">
<i class='bx bx-arrow-back'></i> Atrás
</a>

<div class="container">

<div class="form-box">

<div class="icono">
<i class='bx bx-user-plus'></i>
</div>

<h1>¡Únete a ColCoffe!</h1>
<p>Crea tu cuenta y disfruta de ofertas exclusivas</p>

<form>

<div class="form-grid">

<div class="input-box">
<label><i class='bx bx-id-card'></i> Numero de identificacion</label>
<input type="text" placeholder="Ej: 1076304204">
</div>

<div class="input-box">
<label><i class='bx bx-user'></i> Nombre</label>
<input type="text" placeholder="Ej: Andres">
</div>

<div class="input-box">
<label><i class='bx bx-user'></i> Apellido</label>
<input type="text" placeholder="Ej: Cardoso">
</div>

<div class="input-box">
<label><i class='bx bx-calendar'></i> Edad</label>
<input type="number" placeholder="Ej: 23">
</div>

<div class="input-box">
<label><i class='bx bx-male'></i> Genero</label>
<input type="text" placeholder="Ej: Masculino">
</div>

<div class="input-box">
<label><i class='bx bx-phone'></i> Telefono</label>
<input type="text" placeholder="Ej: 3148573093">
</div>

<div class="input-box">
<label><i class='bx bx-envelope'></i> Correo electronico</label>
<input type="email" placeholder="Ej: tucorreo@gmail.com">
</div>

<div class="input-box">
<label><i class='bx bx-lock'></i> Contraseña</label>
<input type="password" placeholder="****">
</div>

<div class="input-box">
<label><i class='bx bx-lock'></i> Confirmar contraseña</label>
<input type="password" placeholder="****">
</div>

</div>

<div class="terminos">
    <input type="checkbox" id="check">
    <label for="check">
        Acepto los <a href="#">terminos y condiciones</a> y las
        <a href="#">politicas de privacidad</a>
    </label>
</div>

<button class="btn">Registrarme aqui</button>

<p class="login-link">
¿Ya tienes cuenta? <a href="login.html">Registrate aqui</a>
</p>

</form>

</div>
</div>

</body>
</html>
